name: cargolink_app
description: "CargoLink - On-demand cargo transportation platform"
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ^3.5.0

dependencies:
  flutter:
    sdk: flutter

  # UI & Design
  cupertino_icons: ^1.0.8
  google_fonts: ^6.2.1
  flutter_svg: ^2.0.10

  # State Management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # HTTP & API (connects to our Django backend)
  dio: ^5.7.0
  http: ^1.2.2

  # Local Storage (save auth token)
  shared_preferences: ^2.3.2

  # Maps & Location (added back when Google Maps API key is configured)
  # google_maps_flutter: ^2.9.0
  # geolocator: ^13.0.1
  # geocoding: ^3.0.0

  # Real-time (WebSocket to Django Channels)
  web_socket_channel: ^3.0.1

  # Date & Time
  intl: ^0.19.0

  # Image Handling
  image_picker: ^1.1.2
  cached_network_image: ^3.4.1

  # Notifications (re-enable when push notifications are implemented)
  # flutter_local_notifications: ^18.0.1

  # Logging
  logger: ^2.4.0

  # Validation
  email_validator: ^2.1.17

  # Charts (for carrier earnings dashboard)
  fl_chart: ^0.70.2

  # Permission Handling
  permission_handler: ^11.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.13
  riverpod_generator: ^2.4.3

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
