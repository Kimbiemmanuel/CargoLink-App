name: Flutter APK Build

on:
  push:
    branches:
      - main
      - new_frontend
    paths:
      - 'frontend/**'
      - '.github/workflows/flutter-build.yml'
  workflow_dispatch:    # ← allows manual trigger from GitHub UI

jobs:
  build-apk:
    name: Build Flutter APK
    runs-on: ubuntu-latest

    steps:
      # ── Step 1: Checkout code ──────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── Step 2: Setup Java (required for Android builds) ───
      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # ── Step 3: Setup Flutter ──────────────────────────────
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.38.6'
          channel: 'stable'
          cache: true

      # ── Step 4: Navigate to frontend and get dependencies ──
      - name: Install Flutter dependencies
        working-directory: frontend
        run: flutter pub get

      # ── Step 5: Update API base URL for production ─────────
      - name: Update API base URL to production
        working-directory: frontend
        run: |
          sed -i 's|http://10.0.2.2:8000/api|https://cargolink-app-pxnf.onrender.com/api|g' lib/services/api_service.dart
          sed -i 's|http://10.0.2.2:8000/api|https://cargolink-app-pxnf.onrender.com/api|g' lib/services/auth_service.dart
          echo "✅ API URL updated to production"

      # ── Step 6: Build APK ──────────────────────────────────
      - name: Build release APK
        working-directory: frontend
        run: flutter build apk --release --no-tree-shake-icons

      # ── Step 7: Upload APK as artifact ────────────────────
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: CargoLink-APK-${{ github.sha }}
          path: frontend/build/outputs/flutter-apk/app-release.apk
          retention-days: 30

      # ── Step 8: Build summary ─────────────────────────────
      - name: Build summary
        run: |
          echo "🎉 APK built successfully!"
          echo "📦 Artifact: CargoLink-APK-${{ github.sha }}"
          echo "⬇️ Download from GitHub Actions → Artifacts"
